  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --accent: #4f8ef7;
      --accent2: #f7a14f;
      --green: #2ecc71;
      --text: #e8eaf0;
      --muted: #8b90a0;
      --border: #2a2d3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #1a2a6c 100%);
      padding: 16px 14px 12px;
      text-align: center;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 3px 16px rgba(0,0,0,0.6);
    }
    header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: 0.5px; }
    .header-sub { font-size: 0.72rem; color: #ccd; margin-top: 3px; opacity: 0.85; }
    .progress-bar { height: 5px; background: rgba(255,255,255,0.15); margin-top: 10px; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4f8ef7, #f7a14f); border-radius: 4px; transition: width 0.5s; }

    .day-tabs {
      display: flex; overflow-x: auto; gap: 6px;
      padding: 10px 10px 0;
      scrollbar-width: none;
      background: var(--bg);
      position: sticky; top: 90px; z-index: 150;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex-shrink: 0;
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 0.72rem; font-weight: 700;
      cursor: pointer;
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--muted);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .day-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .day-tab.today-tab { border-color: var(--accent2); color: var(--accent2); }
    .day-tab.today-tab.active { background: var(--accent2); color: #fff; }

    .content { padding: 10px 10px 80px; max-width: 600px; margin: 0 auto; }
    .day-panel { display: none; animation: fadeIn 0.2s ease; }
    .day-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .day-hero {
      background: linear-gradient(135deg, #1a2040, #2a1a40);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .day-hero-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .day-num { text-align: center; min-width: 52px; }
    .day-num .month-lbl { font-size: 0.58rem; text-transform: uppercase; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
    .day-num .num { font-size: 2.2rem; font-weight: 900; line-height: 1; }
    .day-num .dow-lbl { font-size: 0.6rem; color: var(--muted); }
    .day-info h2 { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .day-info .city-tag { display: inline-block; margin-top: 4px; background: rgba(247,161,79,0.15); color: var(--accent2); border: 1px solid rgba(247,161,79,0.3); border-radius: 12px; padding: 2px 10px; font-size: 0.7rem; font-weight: 700; }
    .today-badge { background: var(--accent2); color: #fff; font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; margin-left: 8px; vertical-align: middle; }

    .map-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .map-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 11px 14px; border-radius: 12px;
      font-size: 0.82rem; font-weight: 700;
      text-decoration: none;
      background: #1c3d7a; color: #7fb3ff;
      border: 1px solid #2a5099;
      flex: 1; min-width: 140px; justify-content: center;
    }
    .map-btn:active { opacity: 0.75; }
    .map-btn.waze { background: #1a3a1a; color: #5de87a; border-color: #2a622a; }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .section-title {
      padding: 11px 14px;
      font-size: 0.78rem; font-weight: 800;
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted);
    }
    .section-title span { font-size: 1rem; }

    .act-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
    .act-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px; background: var(--bg); border-radius: 10px; }
    .act-icon { font-size: 1.1rem; min-width: 26px; text-align: center; margin-top: 1px; }
    .act-text strong { font-size: 0.85rem; display: block; margin-bottom: 1px; }
    .act-text span { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }

    .alert-item {
      margin: 0 0 10px;
      background: #2a1505;
      border: 1px solid #7a3810;
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 0.78rem;
      color: #f9c06a;
      line-height: 1.5;
    }
    .alert-item b { display: block; margin-bottom: 2px; font-size: 0.8rem; }

    .hotel-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; }
    .hotel-card { background: var(--bg); border-radius: 12px; padding: 11px 12px; border: 1px solid var(--border); }
    .hotel-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .hotel-name { font-size: 0.88rem; font-weight: 700; line-height: 1.3; }
    .hotel-stars { font-size: 0.7rem; color: #f7c94f; letter-spacing: 1px; white-space: nowrap; }
    .hotel-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 7px; line-height: 1.4; }
    .hotel-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .hotel-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; background: rgba(79,142,247,0.1); color: #7fb3ff; border: 1px solid rgba(79,142,247,0.2); }
    .hotel-tag.green { background: rgba(46,204,113,0.1); color: #5de87a; border-color: rgba(46,204,113,0.2); }
    .hotel-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .hotel-btn {
      flex: 1; min-width: 100px;
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 9px 10px; border-radius: 10px;
      font-size: 0.75rem; font-weight: 700;
      text-decoration: none;
    }
    .hotel-btn.booking { background: #003580; color: #7ec8ff; border: 1px solid #1a5caa; }
    .hotel-btn.maps { background: #1c3d1c; color: #5de87a; border: 1px solid #2a622a; }

    .food-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; }
    .food-card { background: var(--bg); border-radius: 12px; padding: 11px 12px; border: 1px solid var(--border); }
    .food-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
    .food-name { font-size: 0.88rem; font-weight: 700; }
    .food-type { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .food-type.indian { background: rgba(247,161,79,0.15); color: var(--accent2); border: 1px solid rgba(247,161,79,0.3); }
    .food-type.local { background: rgba(79,142,247,0.1); color: #7fb3ff; border: 1px solid rgba(79,142,247,0.2); }
    .food-type.family { background: rgba(46,204,113,0.1); color: #5de87a; border: 1px solid rgba(46,204,113,0.2); }
    .food-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
    .food-kids { font-size: 0.72rem; color: #f9c06a; margin-bottom: 6px; }
    .food-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: 8px;
      font-size: 0.73rem; font-weight: 700;
      text-decoration: none;
      background: #1c2a3d; color: #7fb3ff;
      border: 1px solid #2a4070;
    }

    .book-link-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 0 0 10px;
      padding: 13px 14px;
      background: #3d2000;
      border: 1px solid #7a4010;
      border-radius: 12px;
      font-size: 0.82rem; font-weight: 700;
      color: #f7c06a;
      text-decoration: none;
    }
    .book-link-btn:active { opacity: 0.75; }

    .drive-summary { font-size: 0.75rem; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
    .drive-summary strong { color: var(--text); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #12151f;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 8px 0 14px;
      z-index: 300;
    }
    .nav-btn { flex: 1; text-align: center; font-size: 0.62rem; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px; }
    .nav-btn .nav-icon { font-size: 1.35rem; }
    .nav-btn.active { color: var(--accent); }
  </style>
</head>

let currentDay = 0;

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function buildUI() {
  const today = getToday();
  const todayIdx = TRIP.findIndex(d => d.date === today);
  const tripStart = new Date(TRIP[0].date);
  const tripEnd = new Date(TRIP[TRIP.length-1].date);
  const nowDate = new Date(today);

  document.getElementById('header-date').textContent =
    nowDate.toLocaleDateString('en-CA', {weekday:'short', month:'long', day:'numeric', year:'numeric'});

  let prog = 0;
  if (nowDate >= tripStart && nowDate <= tripEnd) {
    prog = Math.round(((nowDate - tripStart) / (tripEnd - tripStart)) * 100);
  } else if (nowDate > tripEnd) prog = 100;
  document.getElementById('progress-fill').style.width = prog + '%';

  const tabsEl = document.getElementById('day-tabs');
  TRIP.forEach((d, i) => {
    const btn = document.createElement('div');
    btn.className = 'day-tab' + (d.date === today ? ' today-tab' : '');
    btn.id = 'tab-' + i;
    btn.textContent = (d.date === today ? '● ' : '') + d.month + ' ' + d.day;
    btn.onclick = () => showDay(i);
    tabsEl.appendChild(btn);
  });

  const contentEl = document.getElementById('content');
  TRIP.forEach((d, i) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel';
    panel.id = 'panel-' + i;
    panel.innerHTML = buildPanel(d, d.date === today);
    contentEl.appendChild(panel);
  });

  showDay(todayIdx >= 0 ? todayIdx : 0);
}

function buildPanel(d, isToday) {
  let html = '';

  // Hero card
  html += `<div class="day-hero">
    <div class="day-hero-top">
      <div class="day-num">
        <div class="month-lbl">${d.month}</div>
        <div class="num">${d.day}</div>
        <div class="dow-lbl">${d.dow}</div>
      </div>
      <div class="day-info" style="flex:1">
        <h2>${d.title}${isToday ? ' <span class="today-badge">TODAY</span>' : ''}</h2>
        <span class="city-tag">📍 ${d.city}</span>
      </div>
    </div>`;

  if (d.drive) {
    html += `<div class="drive-summary">🚗 <strong>${d.drive.summary}</strong><br>${d.drive.from} → ${d.drive.to}${d.drive.via ? '<br><span style="font-size:0.7rem">via ' + d.drive.via + '</span>' : ''}</div>`;
    html += `<div class="map-btns">
      <a href="${d.drive.gmaps}" target="_blank" class="map-btn">🗺️ Google Maps</a>
      <a href="${d.drive.waze}" target="_blank" class="map-btn waze">🟢 Waze</a>
    </div>`;
  }
  html += '</div>';

  // Alerts
  d.alerts.forEach(a => html += `<div class="alert-item"><b>⚠️ Action Required</b>${a}</div>`);

  // Book link
  if (d.bookLink) html += `<a href="${d.bookLink.url}" target="_blank" class="book-link-btn">${d.bookLink.label}</a>`;

  // Activities
  html += `<div class="section-card"><div class="section-title"><span>🗓️</span> Day Plan</div><div class="act-list">`;
  d.activities.forEach(a => {
    html += `<div class="act-item"><div class="act-icon">${a.icon}</div><div class="act-text"><strong>${a.label}</strong><span>${a.note}</span></div></div>`;
  });
  html += '</div></div>';

  // Hotels
  if (d.hotels.length) {
    html += `<div class="section-card"><div class="section-title"><span>🏨</span> Recommended Hotels</div><div class="hotel-list">`;
    d.hotels.forEach(h => {
      html += `<div class="hotel-card">
        <div class="hotel-top"><div class="hotel-name">${h.name}</div><div class="hotel-stars">${h.stars}</div></div>
        <div class="hotel-meta">${h.meta}</div>
        <div class="hotel-tags">${h.tags.map(t=>`<span class="hotel-tag">${t}</span>`).join('')}${h.greenTags.map(t=>`<span class="hotel-tag green">${t}</span>`).join('')}</div>
        <div class="hotel-btns">
          <a href="${h.booking}" target="_blank" class="hotel-btn booking">🛏️ Booking.com</a>
          <a href="${h.maps}" target="_blank" class="hotel-btn maps">📍 Map</a>
        </div>
      </div>`;
    });
    html += '</div></div>';
  }

  // Food
  if (d.food.length) {
    html += `<div class="section-card"><div class="section-title"><span>🍽️</span> Food — For Your Indian Family</div><div class="food-list">`;
    d.food.forEach(f => {
      html += `<div class="food-card">
        <div class="food-top"><div class="food-name">${f.name}</div><span class="food-type ${f.type}">${f.typeLabel}</span></div>
        <div class="food-meta">${f.meta}</div>
        <div class="food-kids">${f.kids}</div>
        <a href="${f.maps}" target="_blank" class="food-btn">📍 Find on Maps</a>
      </div>`;
    });
    html += '</div></div>';
  }

  return html;
}

function showDay(idx) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  currentDay = idx;
  document.getElementById('panel-' + idx).classList.add('active');
  const tab = document.getElementById('tab-' + idx);
  tab.classList.add('active');
  tab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  window.scrollTo({top:0, behavior:'smooth'});
}

function goToday() {
  const today = getToday();
  const idx = TRIP.findIndex(d => d.date === today);
  showDay(idx >= 0 ? idx : 0);
}

function shiftDay(delta) {
  const next = currentDay + delta;
  if (next >= 0 && next < TRIP.length) showDay(next);
}

buildUI();
</script>
